<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - 3legant.</title>
</head>

<body>
  <div>

    <aside>
      <header>
        <span>3legant.</span>
      </header>
      <figure>
        <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800&auto=format&fit=crop" alt="Sillón elegante con una manta encima" />
      </figure>
    </aside>

    <main>
      <div>

        <h1>Iniciar sesión</h1>

        <p>
          ¿No tienes una cuenta?
          <a href="/sign-up.html">Regístrate</a>
        </p>

        <form action="#" method="post" novalidate>

          <div>
            <label for="identifier">Tu usuario o correo electrónico</label>
            <input
              type="text"
              id="identifier"
              name="identifier"
              placeholder="Tu usuario o correo electrónico"
              autocomplete="username"
              required
            />
          </div>

          <div>
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Contraseña"
              autocomplete="current-password"
              required
            />
            <button type="button" aria-label="Mostrar u ocultar contraseña">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

          <div>
            <div>
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember">Recuérdame</label>
            </div>
            <a href="/forgot-password.html">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit">Iniciar sesión</button>

        </form>

      </div>
    </main>

  </div>
</body>

</html>
